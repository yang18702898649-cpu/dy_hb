name: Android Build and Sign

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties

    # Restore signing config from GitHub Secrets if available
    - name: Setup signing configuration
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ ! -z "$KEYSTORE_BASE64" ]; then
          echo "🔐 Setting up signing configuration..."
          echo "$KEYSTORE_BASE64" | base64 --decode > app/my-release-key.jks
          
          # Create signing.properties
          cat > app/signing.properties << EOF
storeFile=my-release-key.jks
storePassword=$KEYSTORE_PASSWORD
keyAlias=$KEY_ALIAS
keyPassword=$KEY_PASSWORD
EOF
          echo "✅ Signing configuration created"
        else
          echo "⚠️  No signing configuration found, will build unsigned APK"
        fi

    - name: Build Release APK
      run: |
        echo "🚀 Building Release APK..."
        ./gradlew assembleRelease --stacktrace
      env:
        # Optional: Add Gradle daemon JVM args for better performance
        GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true

    - name: Clean up signing files
      if: always()
      run: |
        echo "🧹 Cleaning up signing files..."
        rm -f app/my-release-key.jks
        rm -f app/signing.properties
        echo "✅ Signing files cleaned up"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 7

    - name: List build outputs
      run: |
        echo "📁 Build outputs:"
        find app/build/outputs -name "*.apk" -type f

    - name: Build summary
      run: |
        echo "✅ Build completed successfully!"
        echo "📦 APK artifacts are available in the workflow artifacts section."
        echo "🔐 Signed: ${{ env.KEYSTORE_BASE64 != '' }}"
