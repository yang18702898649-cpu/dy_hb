name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 下载 Gradle Wrapper（如果不存在）
    - name: Setup Gradle Wrapper
      run: |
        if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "Downloading Gradle Wrapper..."
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
          echo "Gradle Wrapper downloaded"
        fi
        chmod +x gradlew

    # 解码签名密钥（从 GitHub Secrets 读取）
    - name: Decode Keystore
      env:
        ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -n "$ENCODED_KEYSTORE" ]; then
          echo "Creating keystore from secrets..."
          echo "$ENCODED_KEYSTORE" | base64 -d > app/keystore.jks
          echo "Keystore created successfully"
        else
          echo "No keystore secret found, will build unsigned APK"
        fi

    # 创建签名配置
    - name: Create Signing Config
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ -n "$KEYSTORE_PASSWORD" ]; then
          echo "storeFile=keystore.jks" > app/signing.properties
          echo "storePassword=$KEYSTORE_PASSWORD" >> app/signing.properties
          echo "keyAlias=$KEY_ALIAS" >> app/signing.properties
          echo "keyPassword=$KEY_PASSWORD" >> app/signing.properties
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Check Debug APK
      run: ls -la app/build/outputs/apk/debug/ || echo "Debug output directory not found"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
        if-no-files-found: warn

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace --no-daemon

    - name: Check Release APK
      run: ls -la app/build/outputs/apk/release/ || echo "Release output directory not found"

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: release-apk
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
        if-no-files-found: warn

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
      uses: softprops/action-gh-release@v1
      with:
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          Automated build from GitHub Actions
          
          ## 安装说明
          1. 下载 `app-release.apk`（推荐）或 `app-debug.apk`
          2. 在 Android 手机上安装
          3. 开启无障碍服务和悬浮窗权限
          4. 准备红包截图到 `/sdcard/Pictures/红包.png`
          5. 点击"开始抢红包"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 清理签名文件
    - name: Cleanup
      if: always()
      run: |
        rm -f app/keystore.jks
        rm -f app/signing.properties
